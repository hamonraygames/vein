name: Deploy web build

# Godot's web export does NOT content-hash filenames (index.wasm/.pck/.js are
# the same name every build), so every asset below uses a short,
# must-revalidate cache instead of "immutable" and the job always finishes
# with a CloudFront invalidation. Skipping either leaves returning visitors
# on a stale WASM binary against a newer .pck under an unchanged URL — see
# deploy_web.sh, which this mirrors for local/manual deploys.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC -> AWS, no long-lived secret involved

jobs:
  build:
    runs-on: ubuntu-latest
    container: barichello/godot-ci:4.7
    env:
      # GitHub Actions overrides HOME to /github/home inside container: jobs,
      # but this image's export templates are baked in under root's actual
      # home (/root/.local/share/godot/export_templates/). Godot resolves
      # the template search path from $HOME, so left at the GH Actions
      # default it looks in an empty directory and fails with "No export
      # template found" even though the templates are right there in the
      # image. Confirmed via `docker run barichello/godot-ci:4.7` directly
      # (HOME=/root, templates present) vs the real failing run's log
      # (looked under /github/home instead).
      HOME: /root
    steps:
      - uses: actions/checkout@v4

      - name: Import project (populates .godot/, which is gitignored)
        run: godot --headless --editor --quit --path . || true
        # Godot's own exit code on this warm-up run is unreliable across
        # versions (it can exit non-zero after a clean import), so this step
        # is allowed to "fail" — the actual proof it worked is the export
        # step immediately after either succeeding or not.

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      # TEMPORARY: decode the actual OIDC token GitHub issues so the trust
      # policy's sub/aud conditions can be matched exactly instead of by
      # guesswork — remove once configure-aws-credentials succeeds.
      - name: Debug OIDC claims
        run: |
          TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq . || \
          echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null | jq .

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::393903547387:role/vein-github-actions-deploy
          aws-region: eu-north-1

      - name: Sync to S3 and invalidate CloudFront
        env:
          BUCKET: vein-web-393903547387
          DISTRIBUTION_ID: E1RKD9V8MS5VYU
        run: |
          cd build/web
          aws s3 sync . "s3://$BUCKET/" --delete \
            --exclude "*.wasm" --exclude "*.pck" --exclude "*.js" --exclude "*.png" --exclude "*.html" \
            --cache-control "public, max-age=3600, must-revalidate"

          aws s3 cp index.wasm "s3://$BUCKET/index.wasm" \
            --content-type "application/wasm" --cache-control "public, max-age=3600, must-revalidate"
          aws s3 cp index.pck "s3://$BUCKET/index.pck" \
            --content-type "application/octet-stream" --cache-control "public, max-age=3600, must-revalidate"
          for f in index.js index.audio.worklet.js index.audio.position.worklet.js; do
            aws s3 cp "$f" "s3://$BUCKET/$f" \
              --content-type "application/javascript" --cache-control "public, max-age=3600, must-revalidate"
          done
          for f in index.png index.icon.png index.apple-touch-icon.png; do
            aws s3 cp "$f" "s3://$BUCKET/$f" \
              --content-type "image/png" --cache-control "public, max-age=3600, must-revalidate"
          done
          aws s3 cp index.html "s3://$BUCKET/index.html" \
            --content-type "text/html" --cache-control "public, max-age=60"

          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
